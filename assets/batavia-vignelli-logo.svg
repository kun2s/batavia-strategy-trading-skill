<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Batavia modernist logo</title>
  <desc id="desc">A restrained Batavia wordmark with a red evidence-and-decision monogram.</desc>
  <rect width="1200" height="420" fill="#F7F7F2"/>

  <g transform="translate(84 72)">
    <rect x="0" y="0" width="276" height="276" fill="#D71920"/>
    <rect x="36" y="36" width="54" height="204" fill="#111111"/>
    <rect x="90" y="36" width="112" height="54" fill="#F7F7F2"/>
    <rect x="90" y="111" width="150" height="54" fill="#F7F7F2"/>
    <rect x="90" y="186" width="112" height="54" fill="#F7F7F2"/>
    <path d="M196 111h44l36 27-36 27h-44l36-27-36-27Z" fill="#111111"/>
  </g>

  <g fill="#111111" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
    <text x="420" y="214" font-size="114" font-weight="700">BATAVIA</text>
    <text x="425" y="273" font-size="25" font-weight="700" letter-spacing="7">EVIDENCE / STRATEGY / RECEIPT</text>
  </g>

  <rect x="420" y="303" width="660" height="10" fill="#111111"/>
  <rect x="1080" y="303" width="36" height="10" fill="#D71920"/>
</svg>
